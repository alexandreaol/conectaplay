<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entrar | ConectaPlay</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body class="login-page">
    <main class="auth-shell">
      <a class="brand auth-brand" href="index.html" aria-label="Voltar para home">
        <span class="brand-mark">CP</span>
        <span>
          <strong id="companyName">ConectaPlay</strong>
          <small>Area do cliente</small>
        </span>
      </a>

      <form id="loginForm" class="auth-card">
        <span class="eyebrow">Bem-vindo</span>
        <h1>Acesse sua conta</h1>
        <label>
          CPF ou CNPJ
          <input type="text" name="login" inputmode="numeric" autocomplete="username" placeholder="Digite seu CPF ou CNPJ" required>
        </label>
        <label>
          Senha
          <input type="password" name="senha" autocomplete="current-password" placeholder="Use se sua conta pedir senha">
        </label>
        <button class="primary-btn full-btn" type="submit">Entrar</button>
        <p id="loginMessage" class="form-message" role="status"></p>
      </form>
    </main>

    <script src="js/auth.js"></script>
  </body>
</html>
